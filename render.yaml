services:
  # Backend FastAPI
  - type: web
    name: ai-product-analyser-api
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r backend/requirements.txt; python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('wordnet')"
    startCommand: cd backend && gunicorn main:app -c gunicorn.conf.py
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_YumJVHrN3O4a@ep-bitter-glade-a1fd99oa-pooler.ap-southeast-1.aws.neon.tech/neondb
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

  # Frontend React (static site)
  - type: web
    name: ai-product-analyser-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ai-product-analyser-api.onrender.com/api
