services:
  # ── Backend FastAPI (Docker) ─────────────────────────────────────────────
  # Using Docker ensures Python 3.11 is used — bypasses Render's default Python 3.14
  - type: web
    name: ai-product-analyser-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://neondb_owner:npg_YumJVHrN3O4a@ep-bitter-glade-a1fd99oa-pooler.ap-southeast-1.aws.neon.tech/neondb
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  # ── Frontend React (Static Site) ─────────────────────────────────────────
  - type: web
    name: ai-product-analyser-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ai-product-analyser-4.onrender.com/api
