services:
  # Backend FastAPI
  - type: web
    name: ai-product-analyser-api
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt; python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('wordnet')"
    startCommand: cd backend && gunicorn main:app -c gunicorn.conf.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-product-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

  # Frontend React (static site)
  - type: web
    name: ai-product-analyser-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://ai-product-analyser-api.onrender.com

databases:
  - name: ai-product-db
    plan: free
    databaseName: product_analyser
